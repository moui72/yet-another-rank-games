name: ArDD version badge sync

# Keeps .github/badges/ardd-version.json in sync with
# .project/ardd-version.md — regenerates the shieldcn dynamic-badge JSON
# whenever that file changes (via /ardd-update, a manual edit, or anything
# else that touches it), and commits only if the JSON actually differs.
# Note: the dynamic badge that reads this JSON renders only for public
# repos — shieldcn (like shields.io before it) fetches
# raw.githubusercontent.com unauthenticated.
on:
  push:
    branches: [main]
    paths:
      - '.project/ardd-version.md'
  workflow_dispatch:

jobs:
  sync-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate badge JSON
        run: |
          set -e
          VF=".project/ardd-version.md"
          OUT=".github/badges/ardd-version.json"

          # Same sed-based read style install.sh/ardd-update-check.sh/
          # source-resolve.sh already use for this file. Prefer the
          # human-readable Source-Ref (a release tag); fall back to a short
          # Source-Commit prefix when no tag is recorded (dev-mode/
          # no-releases-yet installs).
          ref="$(sed -n 's/^Source-Ref: //p' "$VF" | head -1)"
          commit="$(sed -n 's/^Source-Commit: //p' "$VF" | head -1)"
          channel="$(sed -n 's/^Channel: //p' "$VF" | head -1)"
          [ -n "$channel" ] || channel="stable"

          if [ -n "$ref" ]; then
            message="$ref"
          elif [ -n "$commit" ]; then
            message="$(printf '%s' "$commit" | cut -c1-7)"
          else
            message="dev"
          fi

          case "$channel" in
            beta) color="yellow" ;;
            *) color="blue" ;;
          esac

          mkdir -p "$(dirname "$OUT")"
          # The heredoc body and its JSON terminator are indented to this
          # run: | block scalar's indentation on purpose — YAML strips the
          # block's common indent before the shell ever sees the script, so
          # the emitted JSON is unchanged; a column-0 heredoc here is
          # invalid YAML (ff0c F001).
          #
          # shieldcn's dynamic-badge endpoint (badge/dynamic/json.svg) reads
          # {label, value, color, link} — not shields.io's {schemaVersion,
          # message, labelColor}. label/color here are readable fallbacks;
          # the README badge URL overrides label/variant/theme itself, so
          # only "value" (and "link", for the click-through) are load-bearing.
          cat > "$OUT" <<JSON
          {
            "label": "built with ArDD",
            "value": "$message",
            "color": "$color",
            "link": "https://github.com/moui72/artifact-driven-dev"
          }
          JSON

      - name: Commit if changed
        run: |
          set -e
          if git diff --quiet -- .github/badges/ardd-version.json; then
            echo "No change to .github/badges/ardd-version.json — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/ardd-version.json
          git commit -m "chore: sync ArDD version badge [skip ci]"
          git push
