name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Mirrors the pre-commit hook (lint -> type-check -> unit tests) plus the
  # coverage ratchet. CI is the gate of record (constitution).
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test
      - name: Coverage ratchet
        run: npm run coverage:ratchet

  # End-to-end + WCAG 2.1 AA (axe) checks — run in CI rather than pre-commit
  # to keep local commits fast.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
