name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Mirrors the pre-commit hook (lint -> type-check -> unit tests) plus the
  # coverage ratchet. CI is the gate of record (constitution).
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test
      - name: Coverage ratchet
        run: npm run coverage:ratchet

  # End-to-end + WCAG 2.1 AA (axe) checks — run in CI rather than pre-commit
  # to keep local commits fast. Spins up a local Supabase (auth + DB) so the
  # auth/collection flows have a real backend.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations)
        run: supabase start
      - name: Write .env from Supabase status
        run: |
          supabase status -o json > sb.json
          {
            echo "PUBLIC_SUPABASE_URL=$(jq -r .API_URL sb.json)"
            echo "PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(jq -r .PUBLISHABLE_KEY sb.json)"
            echo "SUPABASE_SECRET_KEY=$(jq -r .SECRET_KEY sb.json)"
            echo "DATABASE_URL=$(jq -r .DB_URL sb.json)"
          } > .env
          rm sb.json
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
